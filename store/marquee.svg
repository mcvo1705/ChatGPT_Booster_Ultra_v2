<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#2f2f2f"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Left side: icon + text -->
  <g transform="translate(120, 130)">
    <rect width="80" height="80" rx="18" fill="#10a37f"/>
    <path d="M48 22L24 52h24l-4 34 24-30H44l4-34z" fill="#fff" opacity="0.95"/>
  </g>

  <text x="230" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ececec">ChatGPT Speed Booster</text>
  <text x="230" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8e8ea0">Long conversations, instant load.</text>

  <!-- Feature pills -->
  <g transform="translate(120, 260)">
    <rect width="200" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#b4b4b4">Show last 10 messages</text>
  </g>
  <g transform="translate(340, 260)">
    <rect width="190" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="95" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#b4b4b4">Load more on scroll</text>
  </g>
  <g transform="translate(550, 260)">
    <rect width="160" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="80" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#b4b4b4">Zero data collection</text>
  </g>

  <!-- Right side: mockup chat -->
  <g transform="translate(860, 80)">
    <rect width="420" height="400" rx="16" fill="#2f2f2f" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Hidden messages indicator -->
    <g transform="translate(0, 20)">
      <rect x="60" y="15" width="300" height="36" rx="8" fill="rgba(16,163,127,0.12)" stroke="rgba(16,163,127,0.3)" stroke-width="1"/>
      <text x="210" y="39" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#10a37f">↑ Load more (47 hidden)</text>
    </g>
    <!-- Visible messages -->
    <g transform="translate(20, 80)">
      <rect width="380" height="50" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="15" y="15" width="180" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="15" y="31" width="120" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
    </g>
    <g transform="translate(20, 145)">
      <rect width="380" height="60" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="15" y="15" width="250" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="15" y="31" width="200" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
      <rect x="15" y="43" width="140" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
    </g>
    <g transform="translate(20, 220)">
      <rect width="380" height="50" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="15" y="15" width="160" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="15" y="31" width="220" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
    </g>
    <g transform="translate(20, 285)">
      <rect width="380" height="50" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="15" y="15" width="200" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="15" y="31" width="150" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
    </g>
    <!-- Status badge -->
    <rect x="290" y="360" width="110" height="26" rx="6" fill="rgba(0,0,0,0.5)"/>
    <text x="345" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8e8ea0">4/51 messages</text>
  </g>
</svg>
