<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680" viewBox="0 0 920 680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#2f2f2f"/>
    </linearGradient>
  </defs>
  <rect width="920" height="680" fill="url(#bg)"/>

  <!-- Icon -->
  <g transform="translate(370, 80)">
    <rect width="180" height="180" rx="40" fill="#10a37f"/>
    <path d="M108 36L54 104h54l-9 72 54-68H99l9-72z" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Title -->
  <text x="460" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#ececec">ChatGPT Speed Booster</text>

  <!-- Subtitle -->
  <text x="460" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8e8ea0">Long conversations, instant load.</text>

  <!-- Feature cards -->
  <g transform="translate(60, 420)">
    <rect width="240" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#10a37f">10</text>
    <text x="120" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#b4b4b4">Messages shown</text>
    <text x="120" y="86" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8e8ea0">configurable up to 200</text>
  </g>

  <g transform="translate(340, 420)">
    <rect width="240" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#10a37f">0</text>
    <text x="120" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#b4b4b4">Data collected</text>
    <text x="120" y="86" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8e8ea0">fully private, open source</text>
  </g>

  <g transform="translate(620, 420)">
    <rect width="240" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#10a37f">↑</text>
    <text x="120" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#b4b4b4">Load on demand</text>
    <text x="120" y="86" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8e8ea0">click to reveal older messages</text>
  </g>

  <!-- Bottom tagline -->
  <text x="460" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8e8ea0">Works on chatgpt.com · Chrome, Firefox, Edge, Safari</text>
</svg>
